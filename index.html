<style>
/* ============================================================
   REVOLV — 스타일
   팔레트
   --ink   #05040f  심우주 배경
   --deep  #12102e  네뷸라 베이스
   --cyan  #7df9ff  플레이어 (일렉트릭 시안)
   --amber #ffd166  스파크 (점수 아이템)
   --rose  #ff2d78  스파이크 (위험)
   --viola #b26bff  콤보 / 강조
   ============================================================ */
:root{
  --ink:#05040f; --cyan:#7df9ff; --amber:#ffd166;
  --rose:#ff2d78; --viola:#b26bff;
  --font-d:'Orbitron','Gothic A1',system-ui,sans-serif;    /* 디스플레이 (SF 기하학) */
  --font-logo:'Megrim','Orbitron',system-ui,sans-serif;    /* 로고 (모노라인 스켈레톤) */
  --font-b:'Gothic A1',system-ui,-apple-system,sans-serif;  /* 본문 */
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--ink)}
body{
  font-family:var(--font-b);color:#e8e6ff;
  user-select:none;-webkit-user-select:none;
  touch-action:none; /* 모바일 스크롤/줌 방지 */
  position:fixed;inset:0;width:100%;
  overscroll-behavior:none; /* iOS 고무줄 스크롤 차단 */
}
#game{position:fixed;inset:0;display:block;touch-action:none}

/* ---------- 공통 오버레이 ---------- */
.overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  padding:24px;z-index:10;
  opacity:0;pointer-events:none;
  transition:opacity .45s ease;
}
.overlay.show{opacity:1;pointer-events:auto}
.overlay .panel{display:flex;flex-direction:column;align-items:center;gap:0}

/* ---------- 타이틀 ---------- */
.logo{
  font-family:var(--font-logo);font-weight:400; /* Megrim은 단일 웨이트 */
  font-size:clamp(46px,13vw,96px);letter-spacing:.3em;
  color:#fff;line-height:1;padding-left:.3em; /* letter-spacing 보정 */
  text-shadow:0 0 12px var(--cyan),0 0 42px rgba(125,249,255,.55),0 0 90px rgba(178,107,255,.4);
  animation:logoPulse 3.2s ease-in-out infinite;
}
@keyframes logoPulse{
  0%,100%{text-shadow:0 0 12px var(--cyan),0 0 42px rgba(125,249,255,.55),0 0 90px rgba(178,107,255,.4)}
  50%{text-shadow:0 0 18px var(--cyan),0 0 60px rgba(125,249,255,.8),0 0 120px rgba(178,107,255,.6)}
}
.tagline{
  margin-top:14px;font-family:var(--font-d);font-weight:400;
  font-size:clamp(11px,3vw,14px);letter-spacing:.38em;
  color:rgba(232,230,255,.62);text-transform:uppercase;padding-left:.32em;
}
.rules{
  margin-top:22px;display:flex;gap:26px;font-family:var(--font-d);
  font-size:clamp(12px,3.2vw,14px);letter-spacing:.08em;
}
.rules span{display:flex;align-items:center;gap:8px;color:rgba(232,230,255,.85)}
.mini-ic{display:inline-block;line-height:0}

/* ---------- 버튼 ---------- */
.btn{
  margin-top:38px;font-family:var(--font-d);font-weight:700;
  font-size:clamp(16px,4vw,19px);letter-spacing:.22em;padding:16px 46px 16px 52px;
  color:var(--ink);background:var(--cyan);border:none;border-radius:999px;
  cursor:pointer;position:relative;
  box-shadow:0 0 22px rgba(125,249,255,.65),0 0 70px rgba(125,249,255,.25);
  transition:transform .12s ease,box-shadow .2s ease;
}
.btn:active{transform:scale(.93);box-shadow:0 0 34px rgba(125,249,255,.95)}
.hint{margin-top:22px;font-size:12px;letter-spacing:.14em;color:rgba(232,230,255,.42)}

/* ---------- 인게임 HUD ---------- */
#hud{position:fixed;inset:0;pointer-events:none;z-index:5;opacity:0;transition:opacity .3s}
#hud.show{opacity:1}
#score{
  position:absolute;top:calc(18px + env(safe-area-inset-top));left:0;right:0;
  text-align:center;font-family:var(--font-d);font-weight:500;
  font-size:clamp(34px,9vw,56px);color:#fff;line-height:1;
  text-shadow:0 0 18px rgba(125,249,255,.5);
  transition:transform .1s;
}
#score.pop{transform:scale(1.14)}
#combo{
  position:absolute;top:calc(88px + env(safe-area-inset-top));left:0;right:0;text-align:center;
  font-family:var(--font-d);font-weight:700;font-size:clamp(15px,4vw,19px);
  letter-spacing:.18em;color:var(--viola);
  text-shadow:0 0 14px rgba(178,107,255,.8);
  opacity:0;transform:translateY(-6px);transition:opacity .18s,transform .18s;
}
#combo.on{opacity:1;transform:translateY(0)}
#best-hud{
  position:absolute;top:calc(16px + env(safe-area-inset-top));right:18px;
  font-family:var(--font-d);font-size:12px;letter-spacing:.16em;
  color:rgba(232,230,255,.5);text-align:right;
}
#best-hud b{display:block;font-size:17px;color:rgba(255,209,102,.85);margin-top:3px}
#tap-hint{
  position:absolute;bottom:calc(118px + env(safe-area-inset-bottom));left:0;right:0;
  text-align:center;font-size:13px;letter-spacing:.3em;color:rgba(232,230,255,.55);
  animation:hintBlink 1.4s ease-in-out infinite;
}
@keyframes hintBlink{0%,100%{opacity:.25}50%{opacity:.85}}

/* ---------- 스킬 버튼 (무적 / 자석) ---------- */
#skills{
  position:absolute;bottom:calc(26px + env(safe-area-inset-bottom));
  left:0;right:0;display:flex;justify-content:center;gap:26px;
  pointer-events:auto; /* HUD는 pointer-events:none이므로 여기만 활성화 */
}
.skill{
  --p:0;             /* 게이지 진행률 0~1 (JS에서 갱신) */
  --c:#7df9ff;       /* 게이지 색상 */
  position:relative;width:66px;height:66px;border-radius:50%;
  border:none;background:rgba(18,16,46,.78);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-family:var(--font-d);color:#e8e6ff;
  transition:transform .1s ease,box-shadow .25s ease;
}
.skill:active{transform:scale(.88)}
.skill .ic{line-height:0;color:var(--c);filter:grayscale(1) opacity(.45);transition:filter .25s}
.skill .ic svg{display:block}
.skill .lb{font-size:9px;letter-spacing:.14em;color:rgba(232,230,255,.55)}
/* 원형 게이지 링 (conic-gradient + 마스크) */
.skill::before{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  background:conic-gradient(var(--c) calc(var(--p)*1turn), rgba(232,230,255,.12) 0);
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 3px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 3px));
}
.skill.ready .ic{filter:drop-shadow(0 0 5px currentColor)}
.skill.ready{animation:skillReady 1.1s ease-in-out infinite}
#sk-shield.ready{box-shadow:0 0 22px rgba(125,249,255,.55)}
#sk-magnet.ready{box-shadow:0 0 22px rgba(255,209,102,.55)}
#sk-orbit .ic{filter:drop-shadow(0 0 4px currentColor)} /* 궤도 전환은 항상 사용 가능 */
.skill.active .ic{filter:none}
.skill.active{box-shadow:0 0 26px rgba(255,255,255,.6)}
@keyframes skillReady{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}

/* ---------- 게임오버 ---------- */
#over{background:rgba(5,4,15,.55);backdrop-filter:blur(3px)}
.over-label{
  font-family:var(--font-d);font-weight:700;letter-spacing:.4em;padding-left:.4em;
  font-size:clamp(20px,6vw,30px);color:var(--rose);
  text-shadow:0 0 16px rgba(255,45,120,.9),0 0 60px rgba(255,45,120,.5);
}
.over-score{
  margin-top:16px;font-family:var(--font-d);font-weight:500;
  font-size:clamp(54px,15vw,104px);line-height:1;color:#fff;
  text-shadow:0 0 26px rgba(125,249,255,.6);
}
.over-best{margin-top:14px;font-family:var(--font-d);font-size:14px;letter-spacing:.2em;color:rgba(255,209,102,.8)}
#new-record{
  margin-top:12px;display:none;font-family:var(--font-d);font-weight:700;
  font-size:15px;letter-spacing:.3em;color:var(--amber);
  text-shadow:0 0 16px var(--amber);
  animation:recordFlash .8s ease-in-out infinite;
}
#new-record.show{display:block}
@keyframes recordFlash{0%,100%{opacity:1}50%{opacity:.35}}
.btn.restart{background:var(--rose);color:#fff;
  box-shadow:0 0 22px rgba(255,45,120,.7),0 0 70px rgba(255,45,120,.3)}
.btn.restart:active{box-shadow:0 0 36px rgba(255,45,120,1)}

/* ---------- 사운드 토글 ---------- */
#btn-sound{
  position:fixed;top:calc(14px + env(safe-area-inset-top));left:14px;z-index:30;
  width:42px;height:42px;border-radius:50%;
  border:1px solid rgba(232,230,255,.2);background:rgba(18,16,46,.6);
  font-size:17px;color:#fff;cursor:pointer;
  transition:transform .1s ease;
}
#btn-sound:active{transform:scale(.88)}

/* ---------- 튜토리얼 오버레이 ---------- */
#tut{position:fixed;inset:0;z-index:30;display:none;background:rgba(5,4,15,.5)}
#tut.show{display:block}
#tut.light{background:rgba(5,4,15,.22)} /* 스킬 버튼 소개 시: 버튼이 보이도록 옅게 */
.tut-card{
  position:absolute;left:50%;transform:translateX(-50%);
  width:min(320px,86vw);padding:20px 18px;text-align:center;
  background:rgba(18,16,46,.96);border:1px solid rgba(125,249,255,.35);
  border-radius:16px;box-shadow:0 0 30px rgba(125,249,255,.2);
}
.tut-card.center{top:50%;transform:translate(-50%,-50%)}
.tut-card.bottom{bottom:calc(158px + env(safe-area-inset-bottom))}
/* 스킬 버튼을 가리키는 화살표 꼬리 */
.tut-card.bottom::after{
  content:'';position:absolute;bottom:-9px;width:16px;height:16px;
  background:rgba(18,16,46,.96);
  border-right:1px solid rgba(125,249,255,.35);
  border-bottom:1px solid rgba(125,249,255,.35);
  transform:rotate(45deg);
}
.tut-card.point-left::after{left:calc(50% - 54px)}   /* 🛡️ 무적 버튼 방향 */
.tut-card.point-right::after{left:calc(50% + 38px)}  /* 🧲 자석 버튼 방향 */
.tut-icon{font-size:34px;line-height:1;color:var(--cyan)}
.tut-icon svg{display:inline-block;filter:drop-shadow(0 0 6px currentColor)}
.tut-title{
  margin-top:10px;font-family:var(--font-d);font-weight:700;
  font-size:16px;letter-spacing:.24em;padding-left:.24em;color:var(--cyan);
}
.tut-body{margin-top:10px;font-size:14px;line-height:1.65;color:rgba(232,230,255,.85)}
.tut-body b{color:#fff}
.tut-next{
  margin-top:14px;font-size:11px;letter-spacing:.22em;color:rgba(125,249,255,.7);
  animation:hintBlink 1.4s ease-in-out infinite;
}
/* 블랙홀 안내: 배경 탭으로 닫히지 않고 SKIP 버튼으로만 닫힘 */
.tut-skip{display:none}
#tut.needbtn .tut-skip{display:inline-block;margin-top:16px}
#tut.needbtn .tut-next{display:none}
/* 튜토리얼 중 강조되는 스킬 버튼 */
.skill.spotlight{
  animation:skillReady .9s ease-in-out infinite;
  box-shadow:0 0 30px rgba(255,255,255,.85),0 0 60px rgba(125,249,255,.5);
}
.skill.spotlight .ic{filter:drop-shadow(0 0 6px currentColor)}

/* ---------- 도움말 페이지 ---------- */
#help{z-index:40;background:rgba(5,4,15,.7);backdrop-filter:blur(4px)}
.help-panel{
  max-width:min(350px,90vw);padding:26px 22px;
  max-height:86%;overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:rgba(18,16,46,.94);border:1px solid rgba(125,249,255,.3);
  border-radius:18px;box-shadow:0 0 40px rgba(125,249,255,.15);
}
.help-title{
  font-family:var(--font-d);font-weight:700;font-size:17px;
  letter-spacing:.3em;padding-left:.3em;color:#fff;
  text-shadow:0 0 14px rgba(125,249,255,.6);
}
.help-list{margin-top:6px}
.help-row{
  display:flex;gap:12px;align-items:flex-start;text-align:left;
  font-size:13px;line-height:1.55;color:rgba(232,230,255,.85);margin-top:13px;
}
.help-row b{color:#fff}
.help-ic{flex:none;width:26px;text-align:center;font-size:17px;font-family:var(--font-d)}
.help-ic svg{vertical-align:-3px}
.btn.small{margin-top:22px;padding:11px 36px;font-size:13px;letter-spacing:.2em}
.help-contact{margin-top:18px;font-size:11px;line-height:1.9;color:rgba(232,230,255,.5);text-align:center}
.help-contact a{color:var(--cyan);text-decoration:none}
.over-contact{margin-top:16px;font-size:11px;letter-spacing:.12em;color:rgba(232,230,255,.35)}

/* 다음 목표 배너 (첫 방문자 안내) */
.next-goal{
  margin-top:16px;font-family:var(--font-d);font-weight:500;
  font-size:clamp(11px,3vw,13px);letter-spacing:.12em;text-align:center;
  color:rgba(178,107,255,.9);line-height:1.5;
}
.next-goal .lbl{
  display:block;font-size:9px;letter-spacing:.28em;
  color:rgba(232,230,255,.4);margin-bottom:3px;
}
.next-goal b{color:#fff}
.next-goal:empty{display:none}

/* 공유 버튼 행 */
.share-row{margin-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.share-btn{
  display:flex;align-items:center;gap:7px;
  padding:11px 20px;border-radius:999px;cursor:pointer;
  border:1px solid rgba(125,249,255,.4);background:rgba(18,16,46,.6);
  color:var(--cyan);font-family:var(--font-d);font-weight:500;
  font-size:12px;letter-spacing:.14em;
  transition:transform .12s,box-shadow .2s;
}
.share-btn:active{transform:scale(.93);box-shadow:0 0 18px rgba(125,249,255,.5)}
.share-btn.done{border-color:var(--amber);color:var(--amber)}
.share-ic{font-size:14px;line-height:1}

/* ---------- 언어 선택 버튼 ---------- */
.lang-row{margin-top:20px;display:flex;gap:10px}
.lang-btn{
  padding:7px 18px;border-radius:999px;
  border:1px solid rgba(232,230,255,.25);background:rgba(18,16,46,.6);
  color:rgba(232,230,255,.55);font-size:12px;font-family:var(--font-b);
  cursor:pointer;transition:all .15s;
}
.lang-btn:active{transform:scale(.93)}
.lang-btn.on{
  color:#05040f;background:var(--cyan);border-color:transparent;
  font-weight:700;box-shadow:0 0 14px rgba(125,249,255,.5);
}

/* ---------- 리더보드 ---------- */
#board,#nick{z-index:16}
.board-panel{width:min(420px,88vw);max-height:82vh}
.board-list{
  margin-top:18px;width:100%;max-height:44vh;overflow-y:auto;
  display:flex;flex-direction:column;gap:6px;
  -webkit-overflow-scrolling:touch;
}
.board-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;border-radius:12px;
  background:rgba(18,16,46,.5);
  font-family:var(--font-d);font-size:13px;letter-spacing:.04em;
}
.board-row .b-rank{
  width:28px;flex:none;text-align:center;color:var(--amber);font-weight:700;
}
.board-row .b-nick{
  flex:1;text-align:left;color:#e8e6ff;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.board-row .b-score{flex:none;color:var(--cyan);font-weight:700}
.board-row.top3 .b-rank{color:#fff;text-shadow:0 0 10px rgba(255,209,102,.9)}
.board-empty,.board-loading,.board-error{
  margin-top:22px;font-size:12px;color:rgba(232,230,255,.5);
  font-family:var(--font-b);letter-spacing:.06em;line-height:1.6;
}
.board-mine{
  margin-top:16px;padding:12px 16px;width:100%;border-radius:14px;
  border:1px solid rgba(125,249,255,.35);background:rgba(125,249,255,.08);
  font-family:var(--font-d);font-size:13px;color:#fff;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.board-mine .bm-lbl{font-size:9px;letter-spacing:.24em;color:rgba(232,230,255,.5)}
.board-mine .bm-cta{
  color:var(--cyan);text-decoration:underline;cursor:pointer;font-size:12px;
}
.board-mine:empty{display:none}

/* ---------- 닉네임 입력 ---------- */
.nick-input{
  margin-top:22px;width:min(240px,70vw);
  padding:14px 18px;border-radius:999px;text-align:center;
  border:1px solid rgba(125,249,255,.4);background:rgba(18,16,46,.6);
  color:#fff;font-family:var(--font-d);font-size:16px;letter-spacing:.06em;
  outline:none;
}
.nick-input:focus{border-color:var(--cyan);box-shadow:0 0 16px rgba(125,249,255,.4)}
.nick-input::placeholder{color:rgba(232,230,255,.35)}

/* ---------- 홈 화면 ? 버튼 ---------- */
.corner-btn{
  position:absolute;top:calc(16px + env(safe-area-inset-top));right:16px;
  width:40px;height:40px;border-radius:50%;
  border:1px solid rgba(232,230,255,.25);background:rgba(18,16,46,.6);
  color:#e8e6ff;font-family:var(--font-d);font-weight:700;font-size:17px;
  cursor:pointer;transition:transform .1s;
}
.corner-btn:active{transform:scale(.88)}

/* ---------- BGM 토글 버튼 ---------- */
#btn-music{
  position:fixed;top:calc(16px + env(safe-area-inset-top));left:16px;z-index:20;
  width:40px;height:40px;border-radius:50%;
  border:1px solid rgba(232,230,255,.25);

   목표: 스파크(◆)를 먹고 스파이크(✕)를 피해 최고 점수 달성
   ============================================================ */

// ---------- 캔버스 / 화면 ----------
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, CX = 0, CY = 0, R = 0, Rbase = 0; // R = 실효 궤도 반지름 (블랙홀 시 축소)

const REDUCED = matchMedia('(prefers-reduced-motion: reduce)').matches;

function resize(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2); // 성능 위해 DPR 상한 2
  // iOS 사파리: 툴바 유무에 따라 변하는 "실제 가시 영역"을 기준으로 측정
  const vv = window.visualViewport;
  W = vv ? Math.round(vv.width) : window.innerWidth;
  H = vv ? Math.round(vv.height) : window.innerHeight;
  canvas.width  = Math.round(W * dpr);   // 내부 해상도 (선명도용, DPR 배율)
  canvas.height = Math.round(H * dpr);
  canvas.style.width  = W + 'px';        // 화면 표시 크기는 뷰포트와 동일하게
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  CX = W / 2;
  // 세로: 하단 버튼 간격 확보 위해 위로 / 가로: 버튼이 우측이므로 정중앙
  CY = (W > H * 1.3) ? H / 2 : H / 2 - H * 0.02;
  Rbase = Math.min(W, H) * 0.32;
  R = Rbase * S.orbitK;
  makeStars(); // 해상도 변경 시 별 재배치
}
window.addEventListener('resize', resize);
// iOS 사파리: 주소창/툴바 표시 변화와 화면 회전을 실시간 반영

  window.visualViewport.addEventListener('resize', resize);

window.addEventListener('orientationchange', () => setTimeout(resize, 250));
// 문서 자체의 터치 스크롤 차단 (도움말 페이지 내부 스크롤은 예외 허용)
document.addEventListener('touchmove', e => {
  if (e.target && e.target.closest && e.target.closest('#help')) return;
  e.preventDefault();
}, { passive: false });

const TAU = Math.PI * 2;
const clamp = (v, a, b) => v < a ? a : (v > b ? b : v);
const rand  = (a, b) => a + Math.random() * (b - a);
// 각도 차이를 [-PI, PI] 범위로 정규화
function angDiff(a, b){
  let d = (a - b) % TAU;
  if (d >  Math.PI) d -= TAU;
  if (d < -Math.PI) d += TAU;
  return d;
}

let memBest = 0;
function loadBest(){
  try { return Number(localStorage.getItem('revolv_best')) || 0; }
  catch(e){ return memBest; }
}
function saveBest(v){
  memBest = v;
  try { localStorage.setItem('revolv_best', String(v)); } catch(e){}
}

// 개발자 기기 제외: ?dev 로 접속 시 이 브라우저의 모든 추적을 영구 차단 (?dev=off 로 해제)
let devExcluded = false;
try {
  const q = (typeof location !== 'undefined' && location.search) || '';
  if (/[?&]dev=off\b/.test(q)){
    localStorage.removeItem('revolv_dev');
  } else if (/[?&]dev\b/.test(q)){
    localStorage.setItem('revolv_dev', '1');
  }
  devExcluded = localStorage.getItem('revolv_dev') === '1';
} catch(e){}

function track(name, params){
  try {
    if (devExcluded) return; // 개발자 기기: GA4 전송 차단
    params = params || {};
    // 어느 플랫폼(netlify / itch.io / github.io)에서 플레이됐는지 구분
    params.platform = (typeof location !== 'undefined' && location.hostname) || 'unknown';
    if (typeof gtag === 'function') gtag('event', name, params);
  } catch(e){}
}

// ---------- 사운드 (Web Audio API, 외부 파일 없음) ----------
let AC = null;
function audioCtx(){
  if (!AC){
    try { AC = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  if (AC.state === 'suspended') AC.resume();
  ensureMusic(); // 최초 사용자 입력 시 BGM 시작 (자동재생 정책 준수)
  return AC;
}

// 단일 톤: 주파수, 길이, 파형, 볼륨, (선택) 슬라이드 목표 주파수
function tone(freq, dur, type, vol, slideTo){
  if (muted) return;
  const ac = audioCtx(); if (!ac) return;
  const t = ac.currentTime;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(ac.destination);
  o.start(t); o.stop(t + dur + 0.05);
}
// 노이즈 버스트 (충돌음용)
function noiseBurst(dur, vol){
  if (muted) return;
  const ac = audioCtx(); if (!ac) return;
  const t = ac.currentTime;
  const len = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ac.createBufferSource(); src.buffer = buf;
  const g = ac.createGain(); g.gain.value = vol;
  const f = ac.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(2400, t);
  f.frequency.exponentialRampToValueAtTime(120, t + dur);
  src.connect(f).connect(g).connect(ac.destination);
  src.start(t);
}

/* ============================================================
   BGM — 절차 생성 앰비언트 신스 (외부 파일 없음)
   구성: 디튠 소우 패드(로우패스) + 서브 베이스 + 트라이앵글
   아르페지오(점8분 딜레이 + 피드백) + 하이 쉬머
   난이도↑ → 필터 개방(밝아짐), 블랙홀 중 → 어두워짐
   ============================================================ */
const MUSIC_VOL = 0.22;
const BPM = 72, BAR = (60 / BPM) * 4; // 한 마디 ≈ 3.33초
const mtof = m => 440 * Math.pow(2, (m - 69) / 12);
// 코드 진행: Am9 → Fmaj7 → Cmaj7 → Em7 (몽환적 순환)
const CHORDS = [
  { root: 45, tones: [57, 60, 64, 67, 71] }, // A2 | A3 C4 E4 G4 B4
  { root: 41, tones: [57, 60, 65, 69, 72] }, // F2 | A3 C4 F4 A4 C5
  { root: 36, tones: [55, 59, 64, 67, 72] }, // C2 | G3 B3 E4 G4 C5
  { root: 40, tones: [55, 59, 62, 67, 71] }, // E2 | G3 B3 D4 G4 B4
];
let musicOn = true;
try { musicOn = localStorage.getItem('revolv_music') !== '0'; } catch(e){}
let musicReady = false, musicGain = null, padFilter = null, delaySend = null;
let nextBarT = 0, barIdx = 0;

function ensureMusic(){
  if (musicReady || !AC) return;
  musicReady = true;
  musicGain = AC.createGain();
  musicGain.gain.value = 0;
  musicGain.connect(AC.destination);
  // 패드 전용 로우패스 (난이도에 따라 개방)
  padFilter = AC.createBiquadFilter();
  padFilter.type = 'lowpass'; padFilter.frequency.value = 560; padFilter.Q.value = 0.7;
  padFilter.connect(musicGain);
  // 점8분 딜레이 + 피드백 (몽환감의 핵심)
  delaySend = AC.createGain(); delaySend.gain.value = 0.5;
  const dly = AC.createDelay(1.0); dly.delayTime.value = (BAR / 8) * 1.5;
  const fb  = AC.createGain(); fb.gain.value = 0.38;
  const wet = AC.createGain(); wet.gain.value = 0.6;
  delaySend.connect(dly); dly.connect(fb); fb.connect(dly); dly.connect(wet); wet.connect(musicGain);
  nextBarT = AC.currentTime + 0.1; barIdx = 0;
  setInterval(musicLoop, 300); // 룩어헤드 스케줄러
  if (musicOn) setMusicVol(MUSIC_VOL, 1.5);
}
function musicLoop(){
  if (!AC) return;
  if (!musicOn){ nextBarT = Math.max(nextBarT, AC.currentTime + 0.1); return; }
  while (nextBarT < AC.currentTime + 1.6){
    scheduleBar(nextBarT, CHORDS[barIdx % CHORDS.length]);
    barIdx++;
    nextBarT += BAR;
  }
}
function scheduleBar(t0, ch){
  // 필터: 난이도로 개방, 블랙홀 중 어둡게
  const cutoff = clamp(520 + difficulty() * 115 + (S.feverT > 0 ? 650 : 0), 520, 2600) * (S.bhActive ? 0.55 : 1);
  padFilter.frequency.setTargetAtTime(cutoff, t0, 0.6);
  // --- 패드: 3화음 × 디튠 페어 ---
  for (let i = 0; i < 3; i++){
    const f = mtof(ch.tones[i]);
    for (const det of [-5, 5]){
      const o = AC.createOscillator(), g = AC.createGain();
      o.type = 'sawtooth'; o.frequency.value = f; o.detune.value = det;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(0.026, t0 + BAR * 0.35);
      g.gain.linearRampToValueAtTime(0.0001, t0 + BAR * 1.05);
      o.connect(g).connect(padFilter);
      o.start(t0); o.stop(t0 + BAR * 1.1);
    }
  }
  // --- 서브 베이스 ---
  const b = AC.createOscillator(), bg = AC.createGain();
  b.type = 'sine'; b.frequency.value = mtof(ch.root);
  bg.gain.setValueAtTime(0.0001, t0);
  bg.gain.linearRampToValueAtTime(0.085, t0 + 0.12);
  bg.gain.setValueAtTime(0.085, t0 + BAR * 0.6);
  bg.gain.linearRampToValueAtTime(0.0001, t0 + BAR);
  b.connect(bg).connect(musicGain);
  b.start(t0); b.stop(t0 + BAR + 0.05);
  // --- 아르페지오 (8분음표, 딜레이 센드) ---
  const pat = [0, 2, 4, 3, 1, 4, 2, 3];
  for (let i = 0; i < 8; i++){
    if (Math.random() < 0.15) continue; // 가끔 쉼표 — 기계적이지 않게
    const t = t0 + i * (BAR / 8);
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'triangle';
    o.frequency.value = mtof(ch.tones[pat[i]] + 12);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.05, t + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
    o.connect(g);
    g.connect(musicGain);
    g.connect(delaySend);
    o.start(t); o.stop(t + 0.55);
  }
  // --- 하이 쉬머 (두 마디에 한 번, 긴 잔향) ---
  if (barIdx % 2 === 0){
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'sine'; o.frequency.value = mtof(ch.tones[4] + 12);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(0.016, t0 + BAR * 0.5);
    g.gain.linearRampToValueAtTime(0.0001, t0 + BAR * 2);
    o.connect(g).connect(musicGain);
    o.start(t0); o.stop(t0 + BAR * 2 + 0.1);
  }
}
function setMusicVol(v, t){
  if (musicGain && AC) musicGain.gain.setTargetAtTime(v, AC.currentTime, t || 0.3);
}
function toggleMusic(){
  musicOn = !musicOn;
  try { localStorage.setItem('revolv_music', musicOn ? '1' : '0'); } catch(e){}
  document.getElementById('btn-music').classList.toggle('off', !musicOn);
  if (musicOn){ audioCtx(); setMusicVol(S.mode === 'over' || S.mode === 'dying' ? 0.05 : MUSIC_VOL); }
  else setMusicVol(0, 0.2);
}

/* ============================================================
   BGM — 절차적 앰비언트 음악 (외부 파일 없음)
   구성: 느린 패드(디튠 2겹) + 사인 베이스 + 에코 아르페지오 + 고음 스파클
   진행: Am7 → Fmaj7 → Cmaj7 → Em7 (몽환적 4코드 루프, 약 15초 주기)
   난이도가 오르면 필터가 밝아지고, 블랙홀 중엔 어둡게 잠깁니다.
   ============================================================ */
const BGM_VOL = 0.16;
const BGM_STEP = 0.235; // 8분음표 길이 (약 64 BPM 셔플감)
// 음정은 A4(440Hz) 기준 반음 오프셋으로 표기
const noteF = semi => 440 * Math.pow(2, semi / 12);
const PROG = [
  { bass: -24, pad: [-12, -9, -5],  arp: [-9, -5, -2, 3]  },  // Am7  (+C5)
  { bass: -28, pad: [-16, -12, -9], arp: [-12, -9, -5, 0] },  // Fmaj7(+A4)
  { bass: -21, pad: [-9, -5, -2],   arp: [-5, -2, 2, 7]   },  // Cmaj7(+E5)
  { bass: -29, pad: [-17, -14, -10],arp: [-10, -7, -2, 5] },  // Em7  (+D5)
];
const ARP_PAT = [0,2,1,3, 2,0,3,1, 0,2,1,3, 2,3,1,2];

const BGM = { on: false, timer: null, next: 0, step: 0, nodes: null };

function bgmVoice(freq, t0, dur, type, vol, dest, attack){
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  const a = attack || 0.02;
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + a);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g).connect(dest);
  o.start(t0); o.stop(t0 + dur + 0.1);
}

function bgmStart(){
  const ac = audioCtx(); if (!ac || BGM.on) return;
  if (!BGM.nodes){
    const master = ac.createGain();
    master.gain.value = muted ? 0 : BGM_VOL;
    const filter = ac.createBiquadFilter();
    filter.type = 'lowpass'; filter.frequency.value = 1000; filter.Q.value = 0.6;
    const delay = ac.createDelay(1); delay.delayTime.value = 0.34;
    const fb = ac.createGain(); fb.gain.value = 0.38; // 에코 피드백
    delay.connect(fb).connect(delay);
    delay.connect(filter);
    filter.connect(master).connect(ac.destination);
    BGM.nodes = { master, filter, delay, dry: filter };
  }
  BGM.on = true;
  BGM.step = 0;
  BGM.next = ac.currentTime + 0.1;
  BGM.nodes.master.gain.setTargetAtTime(muted ? 0 : BGM_VOL, ac.currentTime, 0.4);
  BGM.timer = setInterval(bgmTick, 60);
}

function bgmStop(fade){
  if (!BGM.on) return;
  BGM.on = false;
  clearInterval(BGM.timer);
  if (BGM.nodes && AC) BGM.nodes.master.gain.setTargetAtTime(0, AC.currentTime, fade || 0.5);
}

// 룩어헤드 스케줄러: 0.35초 앞까지 미리 예약해 타이밍 안정성 확보
function bgmTick(){
  if (!AC || !BGM.on) return;
  while (BGM.next < AC.currentTime + 0.35){
    bgmScheduleStep(BGM.step, BGM.next);
    BGM.step++;
    BGM.next += BGM_STEP;
  }
}

function bgmScheduleStep(step, t){
  const n = BGM.nodes;
  const lvl = difficulty();
  const ch = PROG[Math.floor(step / 16) % PROG.length];
  const loc = step % 16;

  if (loc === 0){
    // 필터 밝기: 레벨이 오르면 밝게, 블랙홀 중에는 어둡게 잠김
    const cut = S.bhActive ? 520 : 1000 + lvl * 130;
    n.filter.frequency.setTargetAtTime(cut, t, 0.8);
    // 패드: 디튠 2겹 × 3음 (느린 어택으로 몽환감)
    for (const s of ch.pad){
      const f = noteF(s);
      bgmVoice(f,         t, 4.4, 'triangle', 0.05, n.dry, 1.4);
      bgmVoice(f * 1.005, t, 4.4, 'sawtooth', 0.018, n.dry, 1.7);
    }
    // 베이스
    bgmVoice(noteF(ch.bass), t, 3.6, 'sine', 0.1, n.dry, 0.4);
  }
  // 아르페지오: 에코 딜레이를 타고 흩어짐. 레벨↑ = 밀도↑
  if (Math.random() < 0.55 + lvl * 0.03){
    const oct = (loc % 8 === 6) ? 12 : 0; // 가끔 한 옥타브 위로 도약
    const f = noteF(ch.arp[ARP_PAT[loc]] + oct);
    bgmVoice(f, t, 0.5, 'sine', 0.07, n.delay, 0.01);
    bgmVoice(f, t, 0.5, 'triangle', 0.028, n.dry, 0.01);
  }
  // 스파클: 드물게 반짝이는 고음
  if (loc === 12 && Math.random() < 0.4){
    bgmVoice(noteF(ch.arp[3] + 24), t, 1.3, 'sine', 0.024, n.delay, 0.06);
  }
}

const P = { angle: -Math.PI / 2, dir: 1, speed: 1.5, r: 9, ring: 0, rk: 1 };

function pPos(){

let particles = []; // {x,y,vx,vy,life,max,size,color}
let texts = [];     // {x,y,txt,life,max,color,size}

let shakeT = 0, shakeMag = 0;   // 화면 흔들림
let flashA = 0, flashColor = '255,45,120'; // 화면 플래시
let ringPulse = 0;              // 궤도 링 펄스
let hueShift = 0;               // 레벨업 시 배경 색조 변화

function makeStars(){

// ---------- 난이도 ----------
function difficulty(){
  // 레벨 = 획득한 스파크 7개마다 +1 (최대 10)
  return Math.min(10, Math.floor(S.collected / 7));
}
// 적응 윈도우: 새 기능 첫 등장 시 일시 감속 후 서서히 복귀
let adaptT = 0;
const ADAPT_DUR = 6.5;
function adaptSoft(){ return 1 - 0.3 * clamp(adaptT / ADAPT_DUR, 0, 1); }
function targetSpeed(){
  // 회전 속도: 성장 완화(0.13) + 피버 +25% + 적응 감속(최대 -30%)
  return (1.5 + difficulty() * 0.13) * (S.feverT > 0 ? 1.25 : 1) * adaptSoft();
}
function maxSpikes(){ return Math.min(4, 1 + Math.floor(difficulty() / 3)); }
function spikeInterval(){ return Math.max(1.1, 2.4 - difficulty() * 0.13); } // 스폰 간격

// ---------- 스폰 ----------
// 같은 궤도의 플레이어/아이템과 겹치지 않는 각도 찾기
function freeAngle(minFromPlayer, ring){
  for (let i = 0; i < 24; i++){
    const a = Math.random() * TAU;
    if (ring === P.ring && Math.abs(angDiff(a, P.angle)) < minFromPlayer) continue;
    let ok = true;
    for (const it of items){
      if (it.ring === ring && Math.abs(angDiff(a, it.angle)) < 0.42){ ok = false; break; }
    }
    if (ok) return a;
  }
  return null;
}
// 듀얼 오빗 해금 후에는 안/밖 궤도에 랜덤 스폰
function pickRing(){ return S.dual ? (Math.random() < 0.5 ? 1 : 0) : 0; }
function spawnSpark(){
  const ring = pickRing();
  const a = freeAngle(0.55, ring);
  if (a === null) return;
  items.push({ kind: 'spark', angle: a, ring, t: 0, life: 7 });
}
function spawnSpike(){
  const ring = pickRing();
  const a = freeAngle(0.95, ring); // 스파이크는 플레이어에게서 더 멀리
  if (a === null) return;
  items.push({ kind: 'spike', angle: a, ring, t: 0, warn: 0.9, life: 0.9 + 4.6 });
}
// 혜성: 궤도를 관통하는 직선 경로
let cometCount = 0; // 이번 판 혜성 수 (초반 2발은 경고를 길게)
function spawnComet(){
  const a = Math.random() * TAU;
  const dx = Math.cos(a), dy = Math.sin(a);
  const off = rand(-R * 0.55, R * 0.55); // 중심에서의 수직 오프셋 → 궤도를 가로지름
  const bx = CX - dy * off, by = CY + dx * off;
  const L = Math.hypot(W, H) * 0.6 + 80;
  const warn = cometCount < 2 ? 1.7 : 1.2; // 첫 2발은 반응 시간 여유
  cometCount++;
  comets.push({ x0: bx - dx * L, y0: by - dy * L, dx, dy,
                t: 0, warn, speed: (2 * L) / 0.9, len: 2 * L });
  sndCometWarn();
}

function burst(x, y, color, n, speed){
  if (REDUCED) n = Math.floor(n / 2);
  for (let i = 0; i < n; i++){
    const a = Math.random() * TAU, v = rand(speed * 0.3, speed);
    particles.push({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v,
                     life: rand(0.35, 0.8), max: 0.8,
                     size: rand(1.5, 3.5), color });
  }
}
function popText(x, y, txt, color, size){
  texts.push({ x, y, txt, life: 0.9, max: 0.9, color, size: size || 18 });

function ripple(x, y, color, max){
  ripples.push({ x, y, r: 6, max: max || 60, life: 0.4, color });
}
function shake(mag, t){
  if (REDUCED) mag *= 0.3;
  shakeMag = Math.max(shakeMag, mag); shakeT = Math.max(shakeT, t);

  if (S.mode !== 'playing' || S.paused || counting || S.magnetGauge < MAGNET_CD) return;

  for (const it of items){
    if (it.kind === 'spark' && !it.pulled){
      it.pulled = true;
      // 소속 궤도 위 현재 위치를 좌표로 고정 후 플레이어를 향해 비행

  S.paused = true;

// 3-2-1 카운트다운 후 게임 재개 — 튜토리얼 카드 닫기/일시정지 해제 공용
// (카드를 닫자마자 바로 재개되어 순간 대응이 어려운 문제 해결)
function runCountdown(done){
  counting = true; // S.paused는 카운트다운 동안 유지 → 게임 정지 상태
  const el = $('count');
  let n = 3;
  const show = () => {
    el.textContent = n;
    el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
    tone(500 + (3 - n) * 120, 0.1, 'sine', 0.14);
  };
  el.classList.add('show');
  show();
  const step = () => {
    n--;
    if (n <= 0){
      el.classList.remove('show');
      counting = false;
      S.paused = false;
      popText(CX, CY - R - 36, 'GO!', '125,249,255', 22);
      tone(880, 0.15, 'sine', 0.15, 1320);
      if (done) done();
      return;
    }
    show();
    setTimeout(step, 650);
  };
  setTimeout(step, 650);
}

// 결과 이미지 생성: 로고 + 점수 + 최고점여부 + CAN YOU BEAT THIS? + 주소
function makeShareImage(score, isRecord){
  const w = 1200, h = 630, cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  const c = cv.getContext('2d');
  // 배경
  const bg = c.createRadialGradient(w/2, h*0.42, 30, w/2, h*0.42, w*0.7);
  bg.addColorStop(0, 'hsl(248,60%,12%)'); bg.addColorStop(1, '#05040f');
  c.fillStyle = bg; c.fillRect(0, 0, w, h);
  // 별
  for (let i = 0; i < 80; i++){
    const x = (i*137.5) % w, y = (i*89.3) % h, z = .3 + ((i*7)%10)/14;
    c.fillStyle = 'rgba(232,230,255,' + (0.12 + z*0.4).toFixed(2) + ')';
    c.fillRect(x, y, z*2, z*2);
  }
  // 궤도 링 + 코어
  c.beginPath(); c.arc(w/2, h*0.42, 150, 0, Math.PI*2);
  c.strokeStyle = 'rgba(140,150,255,.35)'; c.lineWidth = 2;
  c.shadowColor = 'rgba(125,249,255,.8)'; c.shadowBlur = 14; c.stroke(); c.shadowBlur = 0;
  c.beginPath(); c.arc(w/2, h*0.42, 7, 0, Math.PI*2);
  c.fillStyle = '#e8e6ff'; c.shadowColor = '#b28cff'; c.shadowBlur = 20; c.fill(); c.shadowBlur = 0;
  // 로고 (자간 재현)
  const spaced = (txt, font, y, sp, fill, glow, gb) => {
    c.font = font; const ws = [...txt].map(ch => c.measureText(ch).width);
    const tot = ws.reduce((a,b)=>a+b,0) + sp*(txt.length-1);
    let x = (w-tot)/2; c.textBaseline='alphabetic'; c.fillStyle=fill;
    if (glow){ c.shadowColor=glow; c.shadowBlur=gb; }
    [...txt].forEach((ch,i)=>{ c.fillText(ch, x, y); x += ws[i]+sp; });
    c.shadowBlur = 0;
  };
  spaced('REVOLV', '400 76px Megrim, sans-serif', 130, 22, '#fff', 'rgba(125,249,255,.9)', 24);
  // 점수
  c.textAlign = 'center';
  c.font = '500 40px Orbitron, sans-serif';
  c.fillStyle = 'rgba(232,230,255,.6)';
  c.fillText(L[lang].nextEventLbl === 'NEXT EVENT' ? 'SCORE' : '점수', w/2, h*0.60);
  c.font = '700 120px Orbitron, sans-serif';
  c.fillStyle = '#fff'; c.shadowColor = 'rgba(125,249,255,.6)'; c.shadowBlur = 24;
  c.fillText(score.toLocaleString(), w/2, h*0.60 + 108);
  c.shadowBlur = 0;
  if (isRecord){
    c.font = '700 30px Orbitron, sans-serif';
    c.fillStyle = '#ffd166'; c.shadowColor = '#ffd166'; c.shadowBlur = 14;
    c.fillText('★ NEW RECORD ★', w/2, h*0.60 + 152);
    c.shadowBlur = 0;
  }
  // CAN YOU BEAT THIS? + 주소
  c.font = '700 26px Orbitron, sans-serif';
  c.fillStyle = 'rgba(125,249,255,.9)';
  c.fillText('CAN YOU BEAT THIS?', w/2, h - 70);
  c.font = '400 20px Orbitron, sans-serif';
  c.fillStyle = 'rgba(232,230,255,.5)';
  c.fillText('playrevolv.netlify.app', w/2, h - 36);
  c.textAlign = 'left';
  return cv;
}

// 공유 실행: Web Share(이미지+텍스트) 우선, 미지원 시 이미지 새 탭 + 캡션 클립보드 폴백
const SHARE_URL = 'https://playrevolv.netlify.app';
async function shareScore(){
  const score = S.score;
  const isRecord = score >= S.best;
  const text = L[lang].shareText(score);
  sndClick();
  try {
    const cv = makeShareImage(score, isRecord);
    const blob = await new Promise(res => cv.toBlob(res, 'image/png'));
    const file = blob ? new File([blob], 'revolv-score.png', { type: 'image/png' }) : null;
    // 1순위: 이미지 파일 공유 지원 시 — GAME OVER 결과 이미지를 그대로 공유
    if (file && navigator.canShare && navigator.canShare({ files: [file] })){
      await navigator.share({ files: [file], text });
      return;
    }
    // 2순위: 파일 공유 미지원 환경(대부분 PC 브라우저) — 텍스트만 공유하면 이미지가 누락되므로
    // 이미지를 새 탭에 열어 저장/공유 가능하게 하고, 캡션은 클립보드에 복사해 함께 붙여넣을 수 있게 함
    if (blob){
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
    }
    await copyToClipboard(text, 'btn-share');
  } catch(e){
    // 사용자가 공유 취소한 경우 등은 조용히 무시
  }
}
async function copyToClipboard(text, btnId){
  try {
    await navigator.clipboard.writeText(text);
  } catch(e){
    // 구형 폴백
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(e2){}
    document.body.removeChild(ta);
  }
  const b = document.getElementById(btnId);
  if (b){
    const lbl = b.querySelector('span:last-child');
    const orig2 = lbl.textContent;
    lbl.textContent = L[lang].copied;
    b.classList.add('done');
    setTimeout(() => { lbl.textContent = orig2; b.classList.remove('done'); }, 1600);
  }
}

async function fetchLeaderboard(){
  const pid = getPlayerId();
  const headers = { 'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON };
  const topPromise = fetch(
    SB_URL + '/rest/v1/scores?select=nickname,score&order=score.desc&limit=100',
    { headers }
  ).then(r => r.ok ? r.json() : Promise.reject(new Error('http ' + r.status)));

  let minePromise = Promise.resolve(null);
  if (pid && getNickname()){
    minePromise = fetch(
      SB_URL + '/rest/v1/rpc/my_rank',
      { method: 'POST', headers: { ...headers, 'Content-Type': 'application/json' },
        body: JSON.stringify({ p_player_id: pid }) }
    ).then(r => r.ok ? r.json() : Promise.reject(new Error('http ' + r.status)))
     .then(rows => (Array.isArray(rows) && rows[0]) ? rows[0] : null)
     .catch(() => null);
  }

  const top = await topPromise;
  const mine = await minePromise;
  return { top: Array.isArray(top) ? top : [], mine };

  setNickname(v);
  closeNick();
  // 방금 종료된 판이 있다면 그 기록을 바로 제출 (게임오버 직후 최초 등록 흐름)
  if (S.mode === 'over') submitScore(S.score, S.time);
}


function update(dt){
  // 배경/이펙트는 어느 모드에서든 진행
  for (const st of stars) st.tw += dt * 2;

  // 파티클
  for (let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= (1 - 2.2 * dt); p.vy *= (1 - 2.2 * dt);
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
  // 플로팅 텍스트
  for (let i = texts.length - 1; i >= 0; i--){
    const t = texts[i]; t.y -= 42 * dt; t.life -= dt;
    if (t.life <= 0) texts.splice(i, 1);
  }
  // 리플
  for (let i = ripples.length - 1; i >= 0; i--){
    const r = ripples[i]; r.r += (r.max - r.r) * 8 * dt; r.life -= dt;
    if (r.life <= 0) ripples.splice(i, 1);
  }
  if (shakeT > 0) shakeT -= dt; else shakeMag = 0;
  if (flashA > 0) flashA = Math.max(0, flashA - dt * 1.8);
  if (ringPulse > 0) ringPulse = Math.max(0, ringPulse - dt * 3);

  if (S.mode === 'dying'){
    S.dyingT += dt;
    if (S.dyingT > 1.0) showGameOver();
    return;
  }
  if (S.mode === 'over'){ S.overLock -= dt; return; }

  // 메뉴 화면: 오브가 스스로 도는 데모 애니메이션
  if (S.mode === 'menu'){
    P.angle += 0.8 * dt;
    pushTrail();
    return;
  }

  // 튜토리얼 일시정지: 게임 로직만 멈추고 배경/이펙트는 계속
  if (S.paused) return;

  // ===== 플레이 중 =====
  S.time += dt;

  // ----- 스킬 게이지 (무적은 7초 주기로 항상 충전) -----
  S.shieldGauge = Math.min(SHIELD_CD, S.shieldGauge + dt);
  S.magnetGauge = Math.min(MAGNET_CD, S.magnetGauge + dt);
  if (S.shieldT > 0){
    S.shieldT -= dt;
    if (S.shieldT <= 0){ S.shieldT = 0; sndShieldEnd(); }
  }
  updateSkillUI();

  // ----- 이벤트 스케줄러: 5000점마다 위기(블랙홀) ↔ 보상(피버) 교차 -----
  if (S.score >= S.nextEvent && !S.bhActive && S.feverT <= 0){
    if (S.eventIdx % 2 === 0){
      // 🕳️ 블랙홀 (5000, 15000, 25000 ...)
      S.bhActive = true; S.bhT = BH_DUR;
      popText(CX, CY - R - 44, 'BLACK HOLE!', '178,107,255', 24);
      ripple(CX, CY, '178,107,255', R * 1.6);
      flash('120,60,255', 0.3);
      shake(10, 0.5);
      sndBlackhole();
      track('milestone', { type: 'black_hole', score: S.score });
      if (S.eventIdx === 0) adaptT = ADAPT_DUR; // 이번 판 첫 블랙홀: 적응 감속
      if (!seen.bh) showSkipCard('🕳️', T('bhT'), T('bhB'), 'bh');
    } else {
      // 🌟 슈퍼노바 피버 (10000, 20000, 30000 ...)
      S.feverT = FEVER_DUR;
      popText(CX, CY - R - 48, 'SUPERNOVA FEVER!', '255,209,102', 24);
      popText(CX, CY - R - 20, T('x2'), '255,235,170', 15);
      ripple(CX, CY, '255,209,102', R * 1.7);
      flash('255,190,80', 0.28);
      shake(6, 0.35);
      sndFever();
      track('milestone', { type: 'supernova_fever', score: S.score });
      if (S.eventIdx === 1) adaptT = ADAPT_DUR; // 이번 판 첫 피버: 가속과 상쇄되도록 감속
    }
    S.eventIdx++;
    S.nextEvent += EVENT_STEP;
  }
  // 피버 종료 처리
  if (S.feverT > 0){
    S.feverT -= dt;
    if (S.feverT <= 0){
      S.feverT = 0;
      popText(CX, CY - R - 30, 'FEVER END', '255,209,102', 14);
      sndFeverEnd();
    }
  }
  // ----- 혜성 활성화 (19000점) -----
  if (!S.cometOn && S.score >= COMET_AT){
    S.cometOn = true;
    track('milestone', { type: 'comet_zone', score: S.score });
    cometT = 3.5;
    adaptT = Math.max(adaptT, 7); // 혜성 적응 시간
    if (!seen.comet) showSkipCard('☄️', T('cometT'), T('cometB'), 'comet');
    else popText(CX, CY - R - 44, 'COMET ZONE', '255,150,80', 20);
  }
  // ----- 듀얼 오빗 해금 (12000점) -----
  if (!S.dual && S.score >= DUAL_AT){
    S.dual = true;
    track('milestone', { type: 'dual_orbit', score: S.score });
    adaptT = Math.max(adaptT, 7); // 듀얼 오빗 적응 시간
    // 모든 스파이크 소멸 (연습 공간 확보) — 파티클 연출과 함께
    for (let i = items.length - 1; i >= 0; i--){
      if (items[i].kind === 'spike'){
        const it = items[i];
        const ir2 = R * (it.ring ? RING_OUT : 1);
        burst(CX + Math.cos(it.angle) * ir2, CY + Math.sin(it.angle) * ir2, '255,45,120', 14, 190);
        items.splice(i, 1);
      }
    }
    spikeGrace = 6;      // 6초간 스파이크 스폰 중단 (카드가 열려 있는 동안은 정지)
    spikeSpawnT = 0.8;   // 유예 종료 후 첫 스파이크까지 짧게 → 이후 순차 등장
    cometT = Math.max(cometT, 6); // 연습 중 혜성도 잠시 유예
    ripple(CX, CY, '178,107,255', R * RING_OUT);
    if (!seen.dual) showSkipCard(ico('orbit', 34), T('dualT'), T('dualB'), 'dual');
    else popText(CX, CY - R - 44, 'DUAL ORBIT!', '178,107,255', 22);
  }
  // 적응 윈도우 타이머 (카드로 일시정지 중에는 진행되지 않음)
  if (adaptT > 0) adaptT = Math.max(0, adaptT - dt);
  // 궤도 전환 쿨다운 / 반지름 보간
  if (S.orbitCd > 0) S.orbitCd = Math.max(0, S.orbitCd - dt);
  P.rk += ((P.ring ? RING_OUT : 1) - P.rk) * Math.min(1, dt * 10);
  if (S.bhActive){
    S.bhT -= dt;
    // 주변 입자가 중심으로 빨려 들어가는 연출
    if (!REDUCED && Math.random() < dt * 14){
      const a = Math.random() * TAU, d0 = R * rand(1.15, 1.6);
      particles.push({ x: CX + Math.cos(a) * d0, y: CY + Math.sin(a) * d0,
                       vx: -Math.cos(a) * rand(140, 280), vy: -Math.sin(a) * rand(140, 280),
                       life: 0.7, max: 0.7, size: 2, color: '178,107,255' });
    }
    if (S.bhT <= 0){
      S.bhActive = false;
      popText(CX, CY - R - 44, 'ORBIT RESTORED', '125,249,255', 16);
      sndBHEnd();
    }
  }
  // 궤도 반지름을 목표 배율로 부드럽게 축소/복원
  const kTarget = S.bhActive ? BH_SHRINK : 1;
  S.orbitK += (kTarget - S.orbitK) * Math.min(1, dt * 5);
  R = Rbase * S.orbitK;

  // 속도를 목표치로 부드럽게 수렴 (레벨업 시 점진 가속)
  P.speed += (targetSpeed() - P.speed) * dt * 2;
  P.angle += P.dir * P.speed * dt;
  pushTrail();

  // 레벨업 체크
  const lv = difficulty();
  if (lv > S.level){
    S.level = lv;
    hueShift = lv * 24;
    popText(CX, CY - R - 34, 'SPEED UP!', '178,107,255', 22);
    ripple(CX, CY, '178,107,255', R * 1.5);
    flash('178,107,255', 0.14);
    tone(660, 0.16, 'square', 0.12, 990);
  }

  // 콤보 타이머
  if (S.comboTimer > 0){
    S.comboTimer -= dt;
    if (S.comboTimer <= 0){ S.combo = 0; updateCombo(); }
  }

  // 스파이크 스폰 (듀얼 오빗 해금 직후에는 유예 후 순차 재등장)
  if (spikeGrace > 0){
    spikeGrace -= dt;
  } else {
    spikeSpawnT -= dt;
    const spikeCount = items.filter(i => i.kind === 'spike').length;
    if (spikeSpawnT <= 0 && spikeCount < maxSpikes()){
      spawnSpike();
      spikeSpawnT = spikeInterval();
    }
  }

  // 아이템 갱신 + 충돌 판정
  const { x: px, y: py } = pPos();
  let sparkAlive = 0;

  for (let i = items.length - 1; i >= 0; i--){
    const it = items[i];
    it.t += dt;
    if (it.t >= it.life){ items.splice(i, 1); continue; }

    // 아이템의 소속 궤도 반지름 기준 좌표
    const ir = R * (it.ring ? RING_OUT : 1);
    const ix = CX + Math.cos(it.angle) * ir, iy = CY + Math.sin(it.angle) * ir;
    // 유클리드 거리: 같은 궤도면 궤도상 거리와 동일하게 동작하고,
    // 궤도 전환 중에도 자연스러운 판정이 됨
    const dist = Math.hypot(px - ix, py - iy);

    if (it.kind === 'spark'){
      sparkAlive++;
      let hit;
      if (it.pulled){
        // ----- 자석: 플레이어를 향해 가속 비행 -----
        const dx = px - it.x, dy = py - it.y;
        const d = Math.hypot(dx, dy) || 1;
        const sp = 520 + 900 * (1 - Math.min(d / 300, 1)); // 가까울수록 가속
        it.x += dx / d * sp * dt;
        it.y += dy / d * sp * dt;
        hit = d < P.r + 14;
      } else {
        hit = dist < P.r + 11;
      }
      if (hit){
        const hx = it.pulled ? it.x : ix, hy = it.pulled ? it.y : iy;
        items.splice(i, 1);
        collectSpark(hx, hy);
      }
    } else {
      // 스파이크: 경고 시간(warn)이 지나야 무장됨
      const armed = it.t > it.warn;
      const fading = it.life - it.t < 0.5; // 소멸 직전 페이드
      if (armed && !fading && dist < P.r + 10){
        if (S.shieldT > 0){
          // ----- 무적: 스파이크를 파괴하며 통과 -----
          items.splice(i, 1);
          burst(ix, iy, '255,45,120', 18, 240);
          popText(ix, iy - 18, 'BLOCK', '125,249,255', 15);
          ripple(ix, iy, '125,249,255', 58);
          shake(4, 0.15);
          sndBlock();
        } else {
          die(it);
          return;
        }
      }
    }
  }

  // 스파크 유지 개수: 평상시 2개, 피버 중 5개
  const sparkTarget = S.feverT > 0 ? 5 : 2;
  while (sparkAlive < sparkTarget){ spawnSpark(); sparkAlive++; }

  // ----- 혜성 스폰 / 이동 / 충돌 -----
  if (S.cometOn){
    cometT -= dt;
    if (cometT <= 0 && comets.length < 2){
      spawnComet();
      cometT = Math.max(5, rand(6, 8.5) - difficulty() * 0.2);
    }
  }
  for (let i = comets.length - 1; i >= 0; i--){
    const c = comets[i];
    c.t += dt;
    if (c.t <= c.warn) continue; // 경고 중
    const d = (c.t - c.warn) * c.speed;
    if (d > c.len){ comets.splice(i, 1); continue; }
    const hx = c.x0 + c.dx * d, hy = c.y0 + c.dy * d;
    // 꼬리 파티클
    if (!REDUCED && Math.random() < dt * 28){
      particles.push({ x: hx, y: hy,
        vx: -c.dx * 60 + rand(-30, 30), vy: -c.dy * 60 + rand(-30, 30),
        life: 0.5, max: 0.5, size: 2, color: '255,150,80' });
    }
    // 플레이어 충돌
    if (Math.hypot(px - hx, py - hy) < P.r + 8){
      if (S.shieldT > 0){
        if (!c.blocked){ // 통과 중 중복 연출 방지
          c.blocked = true;
          ripple(px, py, '125,249,255', 56);
          sndBlock();
        }
      } else {
        die(c);
        return;
      }
    }
  }
}

function pushTrail(){
  const { x: px, y: py } = pPos();
  trail.push({ x: px, y: py, life: 0.4 });
  if (trail.length > 26) trail.shift();
  for (const t of trail) t.life -= 0.016;
}

// ----- 스파크 획득 처리 (일반 획득 / 자석 흡수 공용) -----
function collectSpark(x, y){
  S.combo++; S.comboTimer = 4;
  const fever = S.feverT > 0;
  const gain = 10 * S.combo * (fever ? FEVER_MULT : 1);
  S.score += gain;
  S.collected++;
  $('score').textContent = S.score;
  const sc = $('score');
  sc.classList.remove('pop'); void sc.offsetWidth; sc.classList.add('pop');
  updateCombo();
  popText(x, y - 18, '+' + gain, fever ? '255,235,170' : '255,209,102', (S.combo >= 3 || fever) ? 22 : 17);
  if (S.combo >= 2) popText(x, y - 44, '×' + S.combo, '178,107,255', 15);
  burst(x, y, '255,209,102', 16 + Math.min(S.combo * 2, 14), 190);
  ripple(x, y, '255,209,102', 52);
  ringPulse = 1;
  if (S.combo >= 4) shake(3, 0.12);
  sndCollect(S.combo);
  if (S.time > 6) $('tap-hint').style.display = 'none';
}

// ---------- 렌더링 ----------
function render(){
  // 배경 그라디언트 (레벨에 따라 색조 변화)
  const g = ctx.createRadialGradient(CX, CY, R * 0.2, CX, CY, Math.max(W, H) * 0.75);
  g.addColorStop(0, 'hsl(' + (248 + hueShift) + ',60%,10%)');
  g.addColorStop(1, '#05040f');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // 네뷸라 글로우 2개 (깊이감)
  ctx.globalCompositeOperation = 'lighter';
  nebula(CX - R * 1.1, CY - R * 0.9, R * 1.4, 'hsla(' + (265 + hueShift) + ',80%,50%,0.05)');
  nebula(CX + R * 1.2, CY + R * 0.8, R * 1.6, 'hsla(' + (190 + hueShift) + ',90%,55%,0.045)');
  ctx.globalCompositeOperation = 'source-over';

  // 별 (반짝임 + 미세 패럴랙스)
  const drift = S.time * 4;
  for (const st of stars){
    const a = 0.25 + 0.55 * (0.5 + 0.5 * Math.sin(st.tw));
    ctx.fillStyle = 'rgba(232,230,255,' + (a * st.z).toFixed(3) + ')';
    const sx = (st.x + drift * st.z) % W;
    ctx.fillRect(sx, st.y, st.z * 1.8, st.z * 1.8);
  }

  // ----- 화면 흔들림 시작 -----
  ctx.save();
  if (shakeT > 0){
    ctx.translate(rand(-shakeMag, shakeMag), rand(-shakeMag, shakeMag));
  }

  // 궤도 링 (피버 중 황금빛)
  const ringCol = S.feverT > 0 ? '255,209,102' : '140,150,255';
  const ringGlow = S.feverT > 0 ? 'rgba(255,209,102,0.8)' : 'rgba(125,249,255,0.8)';
  ctx.beginPath();
  ctx.arc(CX, CY, R, 0, TAU);
  ctx.strokeStyle = 'rgba(' + ringCol + ',' + (0.2 + ringPulse * 0.5) + ')';
  ctx.lineWidth = 1.5 + ringPulse * 2.5;
  ctx.shadowColor = ringGlow;
  ctx.shadowBlur = 8 + ringPulse * 18;
  ctx.stroke();
  ctx.shadowBlur = 0;
  // 바깥 궤도 (듀얼 오빗 해금 시)
  if (S.dual){
    ctx.beginPath();
    ctx.arc(CX, CY, R * RING_OUT, 0, TAU);
    ctx.strokeStyle = 'rgba(178,107,255,' + (0.22 + ringPulse * 0.4) + ')';
    ctx.lineWidth = 1.5 + ringPulse * 2;
    ctx.shadowColor = 'rgba(178,107,255,0.8)';
    ctx.shadowBlur = 7 + ringPulse * 14;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // 중심: 평상시 코어 / 블랙홀 / 슈퍼노바(피버)
  if (S.bhActive){
    drawBlackHole();
  } else if (S.feverT > 0){
    drawSupernova();
  } else {
    const pulse = 1 + Math.sin(performance.now() / 320) * 0.12 + ringPulse * 0.25;
    const coreR = 7 * pulse;
    ctx.beginPath();
    ctx.arc(CX, CY, coreR, 0, TAU);
    ctx.fillStyle = '#e8e6ff';
    ctx.shadowColor = 'hsla(' + (255 + hueShift) + ',90%,70%,1)';
    ctx.shadowBlur = 24;
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // 아이템 (사망 연출 중에는 숨김)
  const dying = S.mode === 'dying';
  if (!dying){
    for (const it of items){
      // 자석에 끌려오는 스파크는 궤도가 아닌 자체 좌표 사용
      const ir = R * (it.ring ? RING_OUT : 1);
      const ix = it.pulled ? it.x : CX + Math.cos(it.angle) * ir;
      const iy = it.pulled ? it.y : CY + Math.sin(it.angle) * ir;
      if (it.kind === 'spark') drawSpark(ix, iy, it);
      else drawSpike(ix, iy, it);
    }
    // 혜성 (경고선 / 돌진)
    for (const c of comets) drawComet(c);
  }

  // 플레이어 잔상 (트레일)
  if (!dying){
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < trail.length; i++){
      const t = trail[i];
      if (t.life <= 0) continue;
      const k = i / trail.length;
      ctx.beginPath();
      ctx.arc(t.x, t.y, P.r * k * 0.85, 0, TAU);
      ctx.fillStyle = 'rgba(125,249,255,' + (0.16 * k).toFixed(3) + ')';
      ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';

    // 플레이어 본체
    const { x: px, y: py } = pPos();
    drawPlayer(px, py);

    // 무적 실드 오라 (종료 0.9초 전부터 깜빡임 경고)
    if (S.shieldT > 0){
      const blink = S.shieldT < 0.9 ? (Math.sin(performance.now() / 55) > 0 ? 1 : 0.2) : 1;
      ctx.beginPath();
      ctx.arc(px, py, P.r + 7 + Math.sin(performance.now() / 110) * 1.5, 0, TAU);
      ctx.strokeStyle = 'rgba(255,255,255,' + (0.85 * blink).toFixed(3) + ')';
      ctx.lineWidth = 2.5;
      ctx.shadowColor = '#7df9ff';
      ctx.shadowBlur = 18;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  // 리플
  for (const r of ripples){
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, TAU);
    ctx.strokeStyle = 'rgba(' + r.color + ',' + (r.life * 1.6).toFixed(3) + ')';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // 파티클
  ctx.globalCompositeOperation = 'lighter';
  for (const p of particles){
    const a = clamp(p.life / p.max, 0, 1);
    ctx.fillStyle = 'rgba(' + p.color + ',' + a.toFixed(3) + ')';
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalCompositeOperation = 'source-over';

  // 플로팅 텍스트
  for (const t of texts){
    const a = clamp(t.life / t.max, 0, 1);
    ctx.font = '700 ' + t.size + 'px "Orbitron","Gothic A1",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(' + t.color + ',' + a.toFixed(3) + ')';
    ctx.shadowColor = 'rgba(' + t.color + ',0.8)';
    ctx.shadowBlur = 10;
    ctx.fillText(t.txt, t.x, t.y);
    ctx.shadowBlur = 0;
  }

  ctx.restore();
  // ----- 화면 흔들림 끝 -----

  // 플래시 오버레이
  if (flashA > 0){
    ctx.fillStyle = 'rgba(' + flashColor + ',' + (flashA * 0.5).toFixed(3) + ')';
    ctx.fillRect(0, 0, W, H);
  }

  // 비네트 (가장자리 어둡게 — 몰입감)
  const vg = ctx.createRadialGradient(CX, CY, Math.min(W, H) * 0.45, CX, CY, Math.max(W, H) * 0.72);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.45)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
}

function nebula(x, y, r, color){
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, color);
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(x - r, y - r, r * 2, r * 2);
}

// 슈퍼노바(피버): 회전하는 광선 + 눈부신 코어
function drawSupernova(){
  const t = performance.now() / 1000;
  ctx.save();
  ctx.translate(CX, CY);
  ctx.globalCompositeOperation = 'lighter';
  ctx.rotate(t * 0.8);
  for (let i = 0; i < 8; i++){
    ctx.rotate(TAU / 8);
    const len = 26 + Math.sin(t * 6 + i) * 6;
    const g = ctx.createLinearGradient(0, 0, len, 0);
    g.addColorStop(0, 'rgba(255,235,170,.9)');
    g.addColorStop(1, 'rgba(255,209,102,0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, -1.6, len, 3.2);
  }
  ctx.globalCompositeOperation = 'source-over';
  ctx.beginPath();
  ctx.arc(0, 0, 9 + Math.sin(t * 7) * 1.5, 0, TAU);
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#ffd166';
  ctx.shadowBlur = 34;
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

// 혜성: 경고선(점선) → 빛나는 머리 + 불꽃 꼬리
function drawComet(c){
  if (c.t < c.warn){
    // 경고선: 점점 선명해지며 깜빡임
    const k = c.t / c.warn;
    const a = (0.15 + 0.4 * k) * (0.55 + 0.45 * Math.sin(c.t * 18));
    ctx.save();
    ctx.setLineDash([8, 8]);
    ctx.beginPath();
    ctx.moveTo(c.x0, c.y0);
    ctx.lineTo(c.x0 + c.dx * c.len, c.y0 + c.dy * c.len);
    ctx.strokeStyle = 'rgba(255,140,80,' + a.toFixed(3) + ')';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
    return;
  }
  const d = (c.t - c.warn) * c.speed;
  const hx = c.x0 + c.dx * d, hy = c.y0 + c.dy * d;
  ctx.globalCompositeOperation = 'lighter';
  // 꼬리
  const tl = 110;
  const g = ctx.createLinearGradient(hx, hy, hx - c.dx * tl, hy - c.dy * tl);
  g.addColorStop(0, 'rgba(255,200,120,.85)');
  g.addColorStop(1, 'rgba(255,90,40,0)');
  ctx.strokeStyle = g;
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(hx, hy);
  ctx.lineTo(hx - c.dx * tl, hy - c.dy * tl);
  ctx.stroke();
  // 머리
  ctx.beginPath();
  ctx.arc(hx, hy, 7, 0, TAU);
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#ff8c50';
  ctx.shadowBlur = 22;
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.globalCompositeOperation = 'source-over';
}

// 블랙홀: 회전하는 강착원반 + 검은 사건의 지평선
function drawBlackHole(){
  const t = performance.now() / 1000;
  ctx.save();
  ctx.translate(CX, CY);
  // 강착원반 (서로 다른 속도로 도는 호 3개)
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 3; i++){
    const a0 = t * (2.4 - i * 0.6) + i * 2.1;
    ctx.beginPath();
    ctx.arc(0, 0, 20 + i * 7, a0, a0 + 2.4);
    ctx.strokeStyle = 'rgba(178,107,255,' + (0.55 - i * 0.14).toFixed(2) + ')';
    ctx.lineWidth = 3 - i * 0.6;
    ctx.shadowColor = '#b26bff';
    ctx.shadowBlur = 16;
    ctx.stroke();
  }
  ctx.globalCompositeOperation = 'source-over';
  ctx.shadowBlur = 0;
  // 사건의 지평선
  ctx.beginPath();
  ctx.arc(0, 0, 13, 0, TAU);
  ctx.fillStyle = '#000';
  ctx.shadowColor = '#b26bff';
  ctx.shadowBlur = 26;
  ctx.fill();
  ctx.strokeStyle = 'rgba(178,107,255,.9)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
}

// 플레이어: 유선형 노즈 + 그라디언트 오브 + 회전 새틀라이트
function drawPlayer(x, y){
  const t = performance.now() / 1000;
  const dir = P.angle + P.dir * Math.PI / 2; // 진행 방향 (궤도 접선)
  ctx.save();
  ctx.translate(x, y);
  // 진행 방향으로 뻗는 유선형 노즈 — 반전 시 방향이 뒤집혀 보임
  ctx.save();
  ctx.rotate(dir);
  ctx.beginPath();
  ctx.moveTo(P.r + 8, 0);
  ctx.quadraticCurveTo(1, 6, -P.r * 0.7, 0);
  ctx.quadraticCurveTo(1, -6, P.r + 8, 0);
  ctx.closePath();
  ctx.fillStyle = 'rgba(125,249,255,.35)';
  ctx.shadowColor = '#7df9ff';
  ctx.shadowBlur = 14;
  ctx.fill();
  ctx.restore();
  // 본체: 입체감 있는 라디얼 그라디언트 오브
  const g = ctx.createRadialGradient(-P.r * 0.3, -P.r * 0.3, 1, 0, 0, P.r);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(0.45, '#aefcff');
  g.addColorStop(1, '#3ec9de');
  ctx.beginPath();
  ctx.arc(0, 0, P.r, 0, TAU);
  ctx.fillStyle = g;
  ctx.shadowColor = '#7df9ff';
  ctx.shadowBlur = 22;
  ctx.fill();
  ctx.shadowBlur = 0;
  // 미니 새틀라이트 3개 — 게임의 궤도 콘셉트를 캐릭터에 반영
  for (let i = 0; i < 3; i++){
    const a = t * 2.8 + i * TAU / 3;
    ctx.beginPath();
    ctx.arc(Math.cos(a) * (P.r + 5.5), Math.sin(a) * (P.r + 5.5), 1.7, 0, TAU);
    ctx.fillStyle = 'rgba(232,246,255,.9)';
    ctx.shadowColor = '#7df9ff';
    ctx.shadowBlur = 6;
    ctx.fill();
  }
  ctx.shadowBlur = 0;
  // 상단 하이라이트
  ctx.beginPath();
  ctx.arc(-P.r * 0.25, -P.r * 0.25, P.r * 0.3, 0, TAU);
  ctx.fillStyle = 'rgba(255,255,255,.95)';
  ctx.fill();
  ctx.restore();
}

// 스파크: 이중 역회전 크리스털 + 컷 면 + 광채 레이 + 궤도 글린트
function drawSpark(x, y, it){
  const lifeK = clamp((it.life - it.t) / 1.2, 0, 1); // 마지막 1.2초 동안 축소
  const k = 0.35 + 0.65 * lifeK;
  const s = (8 + Math.sin(it.t * 5) * 1.2) * k;
  ctx.save();
  ctx.translate(x, y);
  // 외곽 크리스털 아웃라인 (본체와 반대 방향 회전)
  ctx.save();
  ctx.rotate(-it.t * 1.3);
  ctx.beginPath();
  ctx.moveTo(0, -s * 1.7); ctx.lineTo(s * 1.1, 0);
  ctx.lineTo(0, s * 1.7); ctx.lineTo(-s * 1.1, 0);
  ctx.closePath();
  ctx.strokeStyle = 'rgba(255,209,102,' + (0.45 * k).toFixed(3) + ')';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  ctx.restore();
  // 본체 크리스털 (그라디언트 채움)
  ctx.rotate(it.t * 2);
  const g = ctx.createLinearGradient(0, -s, 0, s);
  g.addColorStop(0, '#fff6dc');
  g.addColorStop(0.5, '#ffd166');
  g.addColorStop(1, '#ff9f43');
  ctx.beginPath();
  ctx.moveTo(0, -s); ctx.lineTo(s * 0.72, 0); ctx.lineTo(0, s); ctx.lineTo(-s * 0.72, 0);
  ctx.closePath();
  ctx.fillStyle = g;
  ctx.shadowColor = '#ffd166';
  ctx.shadowBlur = 16;
  ctx.fill();
  ctx.shadowBlur = 0;
  // 컷 면 하이라이트
  ctx.beginPath();
  ctx.moveTo(0, -s); ctx.lineTo(0, s);
  ctx.moveTo(-s * 0.72, 0); ctx.lineTo(s * 0.72, 0);
  ctx.strokeStyle = 'rgba(255,255,255,' + (0.5 * k).toFixed(3) + ')';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
  // 4방 광채 레이 (반짝임)
  const tw = 0.5 + 0.5 * Math.sin(it.t * 7 + x);
  const ray = s * (1.6 + 1.1 * tw);
  ctx.strokeStyle = 'rgba(255,246,220,' + (0.5 * tw * k).toFixed(3) + ')';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x - ray, y); ctx.lineTo(x + ray, y);
  ctx.moveTo(x, y - ray); ctx.lineTo(x, y + ray);
  ctx.stroke();
  // 크리스털 주위를 도는 글린트 점
  const ga = it.t * 3.2;
  ctx.beginPath();
  ctx.arc(x + Math.cos(ga) * s * 1.5, y + Math.sin(ga) * s * 1.5, 1.5 * k, 0, TAU);
  ctx.fillStyle = 'rgba(255,255,255,' + (0.8 * k).toFixed(3) + ')';
  ctx.fill();
}

// 스파이크: 경고(점선 원) → 무장(✕) → 소멸 페이드
function drawSpike(x, y, it){
  const armed = it.t > it.warn;
  ctx.save();
  ctx.translate(x, y);
  if (!armed){
    // 경고 텔레그래프: 줄어드는 점선 원
    const k = 1 - it.t / it.warn;
    ctx.beginPath();
    ctx.setLineDash([4, 4]);
    ctx.arc(0, 0, 10 + 16 * k, 0, TAU);
    ctx.strokeStyle = 'rgba(255,45,120,' + (0.35 + 0.5 * (1 - k)) + ')';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.setLineDash([]);
  } else {
    const fade = clamp((it.life - it.t) / 0.5, 0, 1); // 소멸 직전 페이드아웃
    const s = 10 * fade;
    ctx.rotate(it.t * 1.2);
    // 8방 가시 (기뢰)
    ctx.fillStyle = 'rgba(255,45,120,' + fade.toFixed(3) + ')';
    ctx.shadowColor = '#ff2d78';
    ctx.shadowBlur = 14 * fade;
    for (let i = 0; i < 8; i++){
      ctx.save();
      ctx.rotate(i * TAU / 8);
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.42); ctx.lineTo(s * 1.35, 0); ctx.lineTo(0, s * 0.42);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    ctx.shadowBlur = 0;
    // 본체 코어 (어두운 금속질)
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.62, 0, TAU);
    ctx.fillStyle = '#2a0716';
    ctx.strokeStyle = 'rgba(255,120,170,' + fade.toFixed(3) + ')';
    ctx.lineWidth = 1.5;
    ctx.fill();
    ctx.stroke();
    // 맥동하는 위협의 '눈'
    const pk = 0.5 + 0.5 * Math.sin(it.t * 9);
    ctx.beginPath();
    ctx.arc(0, 0, s * 0.22 * (0.8 + 0.4 * pk), 0, TAU);
    ctx.fillStyle = 'rgba(255,90,150,' + ((0.6 + 0.4 * pk) * fade).toFixed(3) + ')';
    ctx.shadowColor = '#ff2d78';
    ctx.shadowBlur = 10 * fade;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

// ---------- 메인 루프 ----------
let last = performance.now();
function loop(now){
  // 탭 전환 등으로 dt가 튀는 것 방지 (터널링 예방)
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

// ---------- 입력 ----------
function primaryAction(){
  if (counting) return; // 카운트다운 중 입력 무시
  if (userPaused){ resumeGame(); return; } // 일시정지 중 탭 = 재개
  if (S.paused){
    if (tutMode !== 'card') tutNext(); // 이벤트 안내는 SKIP 버튼으로만 닫힘
    return;
  }
  if (S.mode === 'playing') reverse();
  else if (S.mode === 'menu') startGame();
  else if (S.mode === 'over' && S.overLock <= 0){ sndClick(); startGame(); }
}
// 포인터(터치+마우스 통합)
window.addEventListener('pointerdown', e => {
  if (e.target.closest('.btn') || e.target.closest('.skill') || e.target.closest('.share-btn')) return; // 버튼은 자체 핸들러 사용
  if ($('board').classList.contains('show') || $('nick').classList.contains('show')) return; // 리더보드/닉네임 화면에서는 재시작 방지
  audioCtx();
  primaryAction();
});
// iOS 사파리 더블탭 줌 등 방지
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
// 키보드 (Space=반전, Q/1=무적, E/2=자석)
window.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'Enter'){
    e.preventDefault();
    audioCtx();
    primaryAction();
  } else if (e.code === 'KeyQ' || e.code === 'Digit1'){
    audioCtx(); activateShield();
  } else if (e.code === 'KeyE' || e.code === 'Digit2'){
    audioCtx(); activateMagnet();
  } else if (e.code === 'KeyS' || e.code === 'ArrowDown'){
    e.preventDefault();
    audioCtx(); switchOrbit();
  } else if (e.code === 'KeyP' || e.code === 'Escape'){
    audioCtx();
    if (userPaused) resumeGame(); else pauseGame();
  }
});
// 스킬 버튼 (즉각 반응을 위해 pointerdown 사용)
function bindSkill(id, fn){
  $(id).addEventListener('pointerdown', e => {
    e.stopPropagation(); e.preventDefault();
    audioCtx(); fn();
  });
}
bindSkill('sk-shield', activateShield);
bindSkill('sk-magnet', activateMagnet);
bindSkill('sk-orbit', switchOrbit);
// 언어 선택 버튼
['en', 'ko'].forEach(l => {
  $('lang-' + l).addEventListener('pointerdown', e => {
    e.stopPropagation(); e.preventDefault();
    audioCtx(); sndClick();
    setLang(l);
  });
});
// 일시정지 버튼 / 재개
$('btn-pause').addEventListener('pointerdown', e => {
  e.stopPropagation(); e.preventDefault();
  audioCtx(); sndClick();
  pauseGame();
});
$('btn-resume').addEventListener('pointerdown', e => {
  e.stopPropagation(); e.preventDefault();
  sndClick();
  resumeGame();
});
$('pause').addEventListener('pointerdown', e => {
  e.stopPropagation(); e.preventDefault();
  resumeGame(); // 화면 아무 곳이나 탭해도 재개 (카운트다운 후 시작)
});
// 탭/앱 전환 시 자동 일시정지
document.addEventListener('visibilitychange', () => {
  if (document.hidden) pauseGame();
});

// BGM 토글 버튼
$('btn-music').addEventListener('pointerdown', e => {
  e.stopPropagation(); e.preventDefault();
  audioCtx();
  toggleMusic();
});
// 튜토리얼 오버레이: 첫 판 안내는 아무 곳이나 탭 → 다음 단계
// (블랙홀 안내는 배경 탭 무시 — SKIP 버튼으로만 닫힘)
$('tut').addEventListener('pointerdown', e => {
  e.stopPropagation(); e.preventDefault();
  audioCtx();
  if (tutMode !== 'card') tutNext();
});
// 블랙홀 안내 SKIP 버튼 (등장 직후 0.5초는 반사 탭 방지로 무시)
$('btn-tut-skip').addEventListener('pointerdown', e => {
  e.stopPropagation(); e.preventDefault();
  if (performance.now() - bhTutAt < 500) return;
  audioCtx();
  tutNext();
});
// 도움말 페이지 열기/닫기 (홈 화면 ? 버튼)
$('btn-help-open').addEventListener('pointerdown', e => {
  e.stopPropagation(); e.preventDefault();
  audioCtx(); sndClick();
  $('help').classList.add('show');
});
$('btn-help-close').addEventListener('pointerdown', e => {
  e.stopPropagation(); e.preventDefault();
  sndClick();
  $('help').classList.remove('show');
});
// 도움말 배경 탭: 게임 시작으로 새지 않게 차단, 패널 밖 탭이면 닫기
$('help').addEventListener('pointerdown', e => {
  e.stopPropagation();
  if (e.target === $('help')) $('help').classList.remove('show');
});
// 버튼
$('btn-start').addEventListener('click', e => {
  e.stopPropagation(); audioCtx(); sndClick(); startGame();
});
$('btn-restart').addEventListener('click', e => {
  e.stopPropagation(); audioCtx(); sndClick(); startGame();
});
// 공유 버튼
if ($('btn-share')) $('btn-share').addEventListener('click', e => {
  e.stopPropagation(); audioCtx(); shareScore();
});
if ($('btn-copy')) $('btn-copy').addEventListener('click', e => {
  e.stopPropagation(); audioCtx(); sndClick();
  copyToClipboard(SHARE_URL, 'btn-copy');
});
// 리더보드 열기 (홈 화면 / 게임오버 화면)
if ($('btn-rank-open')) $('btn-rank-open').addEventListener('click', e => {
  e.stopPropagation(); openBoard();
});
if ($('btn-rank-open2')) $('btn-rank-open2').addEventListener('click', e => {
  e.stopPropagation(); openBoard();
});
$('btn-board-close').addEventListener('pointerdown', e => {
  e.stopPropagation(); e.preventDefault();
  closeBoard();
});
// 리더보드 배경 탭: 패널 밖이면 닫기 (재시작으로 새지 않게 전파도 차단)
$('board').addEventListener('pointerdown', e => {
  e.stopPropagation();
  if (e.target === $('board')) closeBoard();
});
// 닉네임 저장/건너뛰기
$('btn-nick-save').addEventListener('click', e => {
  e.stopPropagation(); audioCtx(); saveNickAndSubmit();
});
$('nick-input').addEventListener('keydown', e => {
  e.stopPropagation();
  if (e.key === 'Enter') saveNickAndSubmit();
});
$('nick-input').addEventListener('pointerdown', e => e.stopPropagation());
$('btn-nick-skip').addEventListener('click', e => {
  e.stopPropagation(); audioCtx(); sndClick();
  setNickSkipped();
  closeNick();
});
$('nick').addEventListener('pointerdown', e => {
  e.stopPropagation();
});

// ---------- 초기화 ----------
resize();
$('best-val').textContent = S.best;
$('btn-music').classList.toggle('off', !musicOn);
applyLang(); // 초기 언어 적용 (기기 언어 또는 저장된 선택)
// 개발자 기기 제외 중이면 좌하단에 작은 표시
if (devExcluded){
  const b = document.createElement('div');
  b.textContent = 'DEV';
  b.style.cssText = 'position:fixed;left:8px;bottom:8px;z-index:50;font:700 9px Orbitron,sans-serif;letter-spacing:.15em;color:rgba(125,249,255,.45);pointer-events:none;';
  document.body.appendChild(b);
}
requestAnimationFrame(t => { last = t; requestAnimationFrame(loop); });
</script>
